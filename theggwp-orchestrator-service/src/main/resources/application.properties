spring.application.name=theggwp-orchestrator-service

# =====================================================================
# Pandascore data source (URLs, token & timeouts kept here for easy change)
# =====================================================================
pandascore.base-url=https://api.pandascore.co
pandascore.tournaments-path=/valorant/tournaments
# API token
pandascore.token=6H7xIIw-zA8lgyS68s2nA9Rr0SDmF3umv3MiF-_edaevwiHvJ1A
# Per-request (token) timeout in milliseconds
pandascore.request-timeout-ms=10000

# =====================================================================
# Scheduler (cron / polling)
# =====================================================================
# Poll interval in milliseconds (default: 60000 = 1 minute)
pandascore.poll-interval-ms=60000
# Thread pool size for scheduled fetch tasks
pandascore.thread-pool-size=4

# =====================================================================
# Configurable rate limiting (per job / data source name)
# =====================================================================
ratelimit.enabled=true
# At most 5 executions per 1000 ms for the pandascore-tournaments job
ratelimit.limits.pandascore-tournaments.permits=5
ratelimit.limits.pandascore-tournaments.period-ms=1000

# =====================================================================
# Henrik API data source
# =====================================================================
henrik.base-url=https://api.henrikdev.xyz
henrik.token=HDEV-e7212a62-9a36-4012-96dd-baada0f9f844
# Esports schedule -> tournaments, series and live series scores (state=inProgress)
henrik.schedule-path=/valorant/v1/esports/schedule
# Player match history -> rich games/rounds/player-stats, keyed by riot ID
henrik.player-matches-path=/valorant/v3/matches/{region}/{name}/{tag}
# Single match by Valorant UUID -> same rich game detail
henrik.match-detail-path=/valorant/v2/match/{matchid}
henrik.request-timeout-ms=15000
henrik.poll-interval-ms=300000
henrik.match-detail-poll-interval-ms=600000
henrik.player-match-poll-interval-ms=900000

# Roster of tracked players to ingest rich stats for (csv of region:name:tag).
# region must be one of: eu, na, latam, br, ap, kr
henrik.roster=
henrik.player-matches-mode=competitive
henrik.player-matches-size=5
# Explicit Valorant match UUIDs to drill into via v2/match (csv); empty = none.
henrik.match-uuids=

# =====================================================================
# Rate limiting for Henrik jobs
# =====================================================================
ratelimit.limits.henrik-schedule.permits=10
ratelimit.limits.henrik-schedule.period-ms=60000
ratelimit.limits.henrik-match-details.permits=30
ratelimit.limits.henrik-match-details.period-ms=60000
ratelimit.limits.henrik-player-matches.permits=20
ratelimit.limits.henrik-player-matches.period-ms=60000

# =====================================================================
# Persistence (SQLite)
# =====================================================================
spring.datasource.url=jdbc:sqlite:theggwp.db
spring.datasource.driver-class-name=org.sqlite.JDBC
# Ensure schema.sql is executed on startup
spring.sql.init.mode=always
